<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription LLM Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 50px;
            max-width: 800px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 36px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.8;
            font-size: 16px;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .features {
            margin-top: 40px;
            text-align: left;
        }

        .features h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .features ul {
            list-style: none;
            padding: 0;
        }

        .features li {
            padding: 10px 0;
            color: #666;
            font-size: 14px;
        }

        .features li:before {
            content: "✓ ";
            color: #667eea;
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📜 Inscription LLM Editor</h1>
        <p>
            碑文データのLLM抽出結果を検証・修正するためのWebエディタです。<br>
            SPARQLエンドポイントから直接データを取得し、リアルタイムで編集できます。
        </p>

        <a href="editor/gold_standard_editor_sparql.html" class="btn">エディタを開く</a>

        <div class="features">
            <h2>主な機能</h2>
            <ul>
                <li>地名による碑文の選択読み込み</li>
                <li>SPARQLエンドポイントとの直接連携</li>
                <li>民族性、神格タイプ、職位の自動補完</li>
                <li>人物、コミュニティ、関係性の編集</li>
                <li>JSON形式でのエクスポート</li>
            </ul>
        </div>
    </div>
</body>
</html>
